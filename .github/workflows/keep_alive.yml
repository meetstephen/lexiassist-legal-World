name: Keep App Awake

on:
  schedule:
    # Runs every 6 hours, offset from the top of the hour to avoid GitHub queue delays
    - cron: '12 */6 * * *'
  workflow_dispatch: # Lets you trigger it manually to test

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl --fail --max-time 30 -I https://lexiassist-legal-world.streamlit.app
